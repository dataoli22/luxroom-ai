name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
          tag_name: ${{ github.ref_name }}

  build-mac-x64:
    name: macOS Intel (x64)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS x64 DMG
        run: npm run build:mac -- --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS x64 DMG
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.dmg
          tag_name: ${{ github.ref_name }}

  build-mac-arm64:
    name: macOS Apple Silicon (arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS arm64 DMG
        run: npm run build:mac -- --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS arm64 DMG
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.dmg
          tag_name: ${{ github.ref_name }}
