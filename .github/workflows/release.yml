name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer + update metadata
        uses: softprops/action-gh-release@v2
        with:
          # latest.yml and the .blockmap are REQUIRED for the in-app auto-updater
          # (electron-updater) to detect and download new versions.
          files: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
          tag_name: ${{ github.ref_name }}

  # macOS is NOT built in CI. Mac users build the app on their own device from
  # source (a one-time `npm run build:mac`) — see the README. This keeps the
  # release pipeline Windows-only and avoids any Mac runner dependency.
