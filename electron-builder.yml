appId: com.luxroom.ai
productName: LuxRoom AI
copyright: Copyright © 2026 LuxRoom AI — Open Source (MIT)

directories:
  buildResources: assets
  output: release

asar: true

files:
  - dist/**/*
  - electron/**/*
  - src/**/*
  - node_modules/**/*
  - package.json

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: LuxRoom-AI-Windows.exe

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: LuxRoom AI

mac:
  target:
    - target: zip
      arch:
        - arm64
  category: public.app-category.productivity
  # Unsigned build (no Apple certificate) — distributed as a zip. Users open it
  # with right-click → Open the first time (see README).
  identity: null
  artifactName: LuxRoom-AI-Mac-AppleSilicon.zip

linux:
  target: AppImage
  category: Utility

publish:
  provider: github
  owner: dataoli22
  repo: luxroom-ai
